name: Deploy to VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VDS (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          password: ${{ secrets.VDS_PASSWORD }}
          port: ${{ secrets.VDS_PORT || 4383 }}
          timeout: 120s
          command_timeout: 60m
          script: |
            echo "✅ SSH connection successful!"
            set -e
            cd "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git safe.directory ----"
            git config --global --add safe.directory "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git credentials ----"
            git config --global credential.helper store
            echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
            
            # Configure git for HTTPS to avoid SSH key issues
            git remote set-url origin https://github.com/odelinkshop/odelink-shop.git
            
            echo "---- DEPLOY: Starting git sync ----"
            git fetch -v --prune origin main || git fetch origin main
            git reset --hard origin/main
            CURRENT_COMMIT="$(git rev-parse HEAD)"
            echo "✅ Git sync complete. Current commit: ${CURRENT_COMMIT}"
            
            echo "---- DEPLOY: Update .env file ----"
            mkdir -p backend
            
            # Using simple echo for each line to avoid any YAML heredoc indentation issues
            cat <<EOF > backend/.env
PORT=5000
NODE_ENV=production
FRONTEND_URL=https://www.odelink.shop
DB_HOST=postgres
DB_PORT=5432
DB_NAME=odelink_shop
DB_USER=postgres
DB_PASSWORD=odelink_production_password_change_me
DATABASE_URL=postgresql://postgres:odelink_production_password_change_me@postgres:5432/odelink_shop
JWT_SECRET=${{ secrets.JWT_SECRET }}
JWT_EXPIRE=7d
EMAIL_HOST=${{ secrets.EMAIL_HOST }}
EMAIL_PORT=${{ secrets.EMAIL_PORT }}
EMAIL_USER=${{ secrets.EMAIL_USER }}
EMAIL_PASS=${{ secrets.EMAIL_PASS }}
GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
BACKEND_URL=https://api.odelink.shop
GIT_COMMIT=${CURRENT_COMMIT}
CORS_ORIGINS=https://www.odelink.shop,https://odelink.shop,https://demo.odelink.shop
SERVE_FRONTEND=true
AUTO_BUILD_FRONTEND=false
PUPPETEER_HEADLESS=true
PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox
CLOUDINARY_CLOUD_NAME=demo
APP_NAME=Ödelink
EMAIL_FROM_NAME=Ödelink Destek
SUPPORT_EMAIL=odelinkdestek@gmail.com
NOVA_ENABLED=true
NOVA_URL=http://nova:3001
EOF

            echo "---- DEPLOY: Building and starting containers (Zero Downtime) ----"
            # Try docker compose first, then docker-compose as fallback
            if command -v docker-compose &> /dev/null; then
              DOCKER_CMD="docker-compose"
            else
              DOCKER_CMD="docker compose"
            fi
            
            # RADICAL CLEANUP to avoid naming conflicts on this VDS
            echo "🔥 Cleaning up existing containers to avoid conflicts..."
            $DOCKER_CMD down || true
            docker rm -f $(docker ps -aq) || true
            
            # Use standard build to leverage caching for speed
            $DOCKER_CMD build
            $DOCKER_CMD up -d --remove-orphans --force-recreate

            echo "---- DEPLOY: Cleanup old images ----"
            docker image prune -f
            
            echo "✅ Deployment complete!"
            $DOCKER_CMD ps
