name: Deploy to VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VDS (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          password: ${{ secrets.VDS_PASSWORD }}
          port: ${{ secrets.VDS_PORT || 4383 }}
          timeout: 120s
          command_timeout: 60m
          script: |
            echo "✅ SSH connection successful!"
            set -e
            cd "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git safe.directory ----"
            git config --global --add safe.directory "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git credentials ----"
            # Embed the token directly into the git remote URL for reliable authentication
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/odelinkshop/odelink-shop.git"
            
            echo "---- DEPLOY: Starting git sync ----"
            git fetch --depth 1 origin main
            git reset --hard origin/main
            CURRENT_COMMIT="$(git rev-parse HEAD)"
            echo "✅ Git sync complete. Commit: ${CURRENT_COMMIT}"
            
            echo "---- DEPLOY: Update .env file ----"
            mkdir -p backend
            cat <<EOF > backend/.env
            PORT=5000
            NODE_ENV=production
            FRONTEND_URL=https://www.odelink.shop
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=odelink_shop
            DB_USER=postgres
            DB_PASSWORD=odelink_production_password_change_me
            DATABASE_URL=postgresql://postgres:odelink_production_password_change_me@postgres:5432/odelink_shop
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=7d
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}
            CLOUDFLARE_EMAIL=${{ secrets.CLOUDFLARE_EMAIL }}
            BACKEND_URL=https://api.odelink.shop
            GIT_COMMIT=${CURRENT_COMMIT}
            CORS_ORIGINS=https://www.odelink.shop,https://odelink.shop,https://demo.odelink.shop
            SERVE_FRONTEND=true
            AUTO_BUILD_FRONTEND=false
            PUPPETEER_HEADLESS=true
            PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox
            CLOUDINARY_CLOUD_NAME=demo
            APP_NAME=Ödelink
            EMAIL_FROM_NAME=Ödelink Destek
            SUPPORT_EMAIL=odelinkdestek@gmail.com
            NOVA_ENABLED=true
            NOVA_URL=http://nova:3001
            GEMINI_API_KEY=AIzaSyCXWr-TqnACh6mE5GpQCQeeRN9DCVXrAao
            SHOPIER_API_TOKEN=eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..H5p8Hu9W_rMvPLNRsHJcIsCXxuy9MRTFJOQQUThTB7IqDcqpdbliAnJ-x2XI_KIA7F3jULnnTdHvOh_aZBY48YmsWvjG0PWvi24-sa6YCBaZyOkMeOlAouFaWWm-OstM4PMqWInyTSFAWNBs9CEkZCd4OyEEGSfciAPW_QrrrD2UVmp7y4jNIHCDrNiHWWYkBA3uPl1Ch8woEz3-JBi4L6VdfNWJLVBbK8-RAf26W343wIJ_N6_wdgfJGQD4BimUFa_8Dvb5gr8L6FAmJ114z7J0JqZOWL-e1lVTzgccNHbZjOC0GsU-y0qfhFdRQnmt4zookEWF8BtkHReQnGlvug
            SHOPIER_APP_CLIENT_ID=11c2fa63beea959c11bafb3c4bc086e8
            SHOPIER_APP_CLIENT_SECRET=975faa0c826776b4e32cd0e76677e81f9ee5a54be108958963884d2334d0169e
            SHOPIER_APP_WEBHOOK_TOKEN=53d807fd385690c5d534d50709ab0f40c6993d02992f149676cb8299fa142fd8
            EOF

            echo "---- DEPLOY: Turbo-Launch (Zero Downtime) ----"
            DOCKER_CMD="docker compose"
            if ! command -v docker compose &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            echo "🏗️ Building in parallel..."
            COMPOSE_DOCKER_CLI_BUILD=1 DOCKER_BUILDKIT=1 $DOCKER_CMD build --parallel
            
            echo "🚀 Launching services..."
            $DOCKER_CMD up -d --remove-orphans
            
            echo "🧹 Quick cleanup..."
            docker image prune -f
            
            echo "✅ Turbo Deployment complete!"
            $DOCKER_CMD ps
