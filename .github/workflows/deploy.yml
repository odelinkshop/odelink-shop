name: Deploy to VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VDS (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          password: ${{ secrets.VDS_PASSWORD }}
          port: ${{ secrets.VDS_PORT || 4383 }}
          timeout: 120s
          command_timeout: 60m
          script: |
            echo "✅ SSH connection successful!"
            set -e
            cd "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git safe.directory ----"
            git config --global --add safe.directory "$HOME/odelink-shop"
            
            echo "---- DEPLOY: Configure git credentials ----"
            git config --global credential.helper store
            echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
            
            # Configure git for HTTPS to avoid SSH key issues
            git remote set-url origin https://github.com/odelinkshop/odelink-shop.git
            
            echo "---- DEPLOY: Starting git sync ----"
            git fetch -v --prune origin main || git fetch origin main
            git reset --hard origin/main
            CURRENT_COMMIT="$(git rev-parse HEAD)"
            echo "✅ Git sync complete. Current commit: ${CURRENT_COMMIT}"
            
            echo "---- DEPLOY: Update .env file ----"
            mkdir -p backend
            
            # Using simple echo for each line to avoid any YAML heredoc indentation issues
            echo "PORT=5000" > backend/.env
            echo "NODE_ENV=production" >> backend/.env
            echo "FRONTEND_URL=https://www.odelink.shop" >> backend/.env
            echo "DB_HOST=postgres" >> backend/.env
            echo "DB_PORT=5432" >> backend/.env
            echo "DB_NAME=odelink_shop" >> backend/.env
            echo "DB_USER=postgres" >> backend/.env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> backend/.env
            echo "DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@postgres:5432/odelink_shop" >> backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
            echo "JWT_EXPIRE=7d" >> backend/.env
            echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> backend/.env
            echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> backend/.env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> backend/.env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> backend/.env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> backend/.env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> backend/.env
            echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" >> backend/.env
            echo "CLOUDFLARE_ZONE_ID=${{ secrets.CLOUDFLARE_ZONE_ID }}" >> backend/.env
            echo "DODO_API_KEY=vhi8S1rR9NdSqCPF.kHiCp-C1imb76d38wvN5Xc9Su41apI015a88Ct7SdcKbfpck" >> backend/.env
            echo "DODO_WEBHOOK_SECRET=whsec_ASE/8kEPnr7GEy3B0ZiwuGbcpzGDPDJK" >> backend/.env
            echo "DODO_PRODUCT_ID_STANDART=pdt_0NdSWrFKux1QaNXAl7VDM" >> backend/.env
            echo "DODO_PRODUCT_ID_PRO=pdt_0NdSXJ8qDtlv6SeYHT7o5" >> backend/.env
            echo "BACKEND_URL=https://api.odelink.shop" >> backend/.env
            echo "GIT_COMMIT=${CURRENT_COMMIT}" >> backend/.env
            echo "CORS_ORIGINS=https://www.odelink.shop,https://odelink.shop,https://demo.odelink.shop" >> backend/.env
            echo "SERVE_FRONTEND=true" >> backend/.env
            echo "AUTO_BUILD_FRONTEND=false" >> backend/.env
            echo "PUPPETEER_HEADLESS=true" >> backend/.env
            echo "PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox" >> backend/.env
            echo "CLOUDINARY_CLOUD_NAME=demo" >> backend/.env
            echo "APP_NAME=Ödelink" >> backend/.env
            echo "EMAIL_FROM_NAME=Ödelink Destek" >> backend/.env
            echo "SUPPORT_EMAIL=odelinkdestek@gmail.com" >> backend/.env
            echo "NOVA_ENABLED=true" >> backend/.env
            echo "NOVA_URL=http://nova:3001" >> backend/.env

            echo "---- DEPLOY: Building and starting containers (Zero Downtime) ----"
            # Try docker compose first, then docker-compose as fallback
            if command -v docker-compose &> /dev/null; then
              DOCKER_CMD="docker-compose"
            else
              DOCKER_CMD="docker compose"
            fi
            
            # RADICAL CLEANUP to avoid naming conflicts on this VDS
            echo "🔥 Cleaning up existing containers to avoid conflicts..."
            $DOCKER_CMD down || true
            docker rm -f $(docker ps -aq) || true
            
            # Use standard build to leverage caching for speed
            $DOCKER_CMD build
            $DOCKER_CMD up -d --remove-orphans --force-recreate

            echo "---- DEPLOY: Cleanup old images ----"
            docker image prune -f
            
            echo "✅ Deployment complete!"
            $DOCKER_CMD ps
