<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap');
    
    body {
      width: 320px;
      background: #000;
      color: #F2EBE1;
      font-family: 'Outfit', sans-serif;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(197, 160, 89, 0.2);
    }

    .container {
      padding: 24px;
      text-align: center;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #C5A059;
      color: black;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      margin: 0 auto 16px;
      box-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .brand-tag {
      font-size: 8px;
      font-weight: 900;
      color: #C5A059;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      outline: none;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #C5A059;
      color: black;
      box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
    }

    .btn-primary:hover {
      background: #F2EBE1;
      transform: translateY(-2px);
    }

    .footer {
      font-size: 8px;
      opacity: 0.3;
      margin-top: 20px;
      letter-spacing: 1px;
    }

    #status-msg {
      font-size: 10px;
      color: #C5A059;
      margin-top: 12px;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">O</div>
    <div class="brand-name">Odelink Connector</div>
    <div class="brand-tag">Professional Exporter</div>

    <button class="btn btn-primary" id="export-btn">MAĞAZAYI PAKETLE (.JSON)</button>
    
    <div id="status-msg"></div>

    <div class="footer">Nova Neural v4.0 PRO</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
